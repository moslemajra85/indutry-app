services:
  - type: web
    name: industry-ops-ai
    runtime: docker
    plan: starter
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: https://industry-ops-ai.onrender.com
      - key: AUTH_TOKEN_SECRET
        generateValue: true
      - key: AI_ENABLED
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: industry-ops-db
          property: connectionString

databases:
  - name: industry-ops-db
    plan: basic-256mb
